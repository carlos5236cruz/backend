services:
  - type: web
    name: bling-manager-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 480
      - key: CORS_ORIGINS
        value: http://atbeaauty.com.br,https://atbeaauty.com.br
      - key: UPLOAD_DIR
        value: uploads
      - key: PYTHON_VERSION
        value: 3.12.0
